<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KTL 고객 서비스</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>

    <!-- 인증 게이트 -->
    <div id="auth-gate" class="auth-gate">
      <div class="auth-card">
        <div class="auth-logo">KTL</div>
        <h1 class="auth-title">고객 서비스</h1>
        <p class="auth-sub">고객 전용 서비스입니다.<br>발급받은 접속 코드 또는 ID/PW를 입력하세요.</p>
        <input id="auth-id" class="field__control" type="text" placeholder="아이디 (관리자만)" autocomplete="username" style="margin-bottom:8px" />
        <input id="auth-pass" class="field__control" type="password" placeholder="비밀번호 또는 접속 코드" autocomplete="current-password" />
        <button id="auth-btn" class="btn btn--primary auth-btn" type="button">접속하기</button>
        <p id="auth-err" class="error auth-err" hidden></p>
      </div>
    </div>

    <!-- 메인 앱 -->
    <div class="app" id="main-app" hidden>
      <header class="app__header">
        <div class="brand">
          <span class="brand__mark">KTL</span>
          <div class="brand__text">
            <h1>고객 서비스</h1>
            <p>수질 먹는물 정도검사</p>
          </div>
        </div>
        <div class="header__tools">
          <span id="status-chip" class="status-chip status-chip--checking" aria-live="polite">
            <span class="status-chip__dot"></span>
            <span class="status-chip__label">연동 확인 중</span>
            <span class="status-chip__meta"></span>
          </span>
          <button id="theme-btn" class="icon-btn icon-btn--lg" type="button" title="라이트/다크 전환" aria-label="테마 전환">◐</button>
          <button id="logout-btn" class="btn btn--ghost btn--mini" type="button" title="로그아웃">로그아웃</button>
        </div>
      </header>

      <!-- 서비스 탭 -->
      <nav class="svc-tabs" role="tablist">
        <button class="svc-tab is-active" type="button" data-svc="calc" role="tab">정도검사 계산기</button>
        <button class="svc-tab svc-tab--admin" type="button" data-svc="admin" role="tab" id="admin-tab" hidden>관리자</button>
      </nav>

      <!-- 정도검사 계산기 -->
      <div id="svc-calc">
        <section id="panel-precision"></section>
      </div>

      <!-- 관리자 패널 -->
      <div id="svc-admin" hidden>
        <div class="card admin-panel">
          <div class="card__bar">
            <h2 class="card__title">관리자 패널</h2>
            <span class="admin-badge">ADMIN</span>
          </div>
          <div id="admin-wrap"></div>
        </div>
      </div>

      <footer class="app__footer">
        <span>KTL 고객 서비스 · 수질 먹는물 정도검사</span>
        <span class="micro">계산·DB는 서버 단일 출처(SSOT)</span>
      </footer>
    </div>

    <!-- AI 법령 해석 플로팅 버튼 -->
    <button id="chat-fab" class="chat-fab" hidden title="AI 법령 해석">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="chat-fab__label">AI 법령</span>
    </button>

    <!-- AI 법령 해석 채팅 패널 -->
    <div id="chat-panel" class="chat-panel" hidden>
      <div class="chat-panel__inner">
        <div class="chat-panel__header">
          <div class="chat-panel__title-group">
            <span class="chat-panel__title">AI 법령 해석</span>
            <div class="chat-panel__badges">
              <span id="law-status-chip" class="law-status-chip law-status-chip--checking" title="국가법령정보 API 연동 상태">
                <span class="law-status-chip__dot"></span>
                <span class="law-status-chip__label">연동 확인 중</span>
              </span>
              <span id="skill-active-badge" class="skill-active-badge" hidden>✦ 전문 스킬</span>
            </div>
          </div>
          <button id="chat-close" class="chat-panel__close" type="button" title="닫기">✕</button>
        </div>
        <p class="chat-panel__desc">수질TMS·먹는물 법령을 AI가 국가법령정보와 전문 지식으로 해석합니다.</p>
        <div class="chat-msgs" id="chat-msgs"></div>
        <div class="chat-bar">
          <textarea id="chat-input" class="chat-input" rows="2"
            placeholder="예: 수질TMS 반복성 검사 기준은? / 물환경보전법 정도검사 주기?"></textarea>
          <button id="chat-send" class="btn btn--primary chat-send-btn" type="button">전송</button>
        </div>
      </div>
    </div>
    <!-- 채팅 패널 배경 오버레이 -->
    <div id="chat-overlay" class="chat-overlay" hidden></div>

    <script type="module" src="./main.js"></script>
    <script type="module" src="./precision-ui.js"></script>
  </body>
</html>
